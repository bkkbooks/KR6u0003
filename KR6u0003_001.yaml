body:
  text: 慈仁問佛何因緣揚八十種好佛言一者世世等意向人故得足下平蹈地文現二者人之所喜輒與之令安穩故得足槦好表識三者和合人見人輒歡喜故足下綺人受經莫不開解四者丘墻不平生荊棘鋤治故足下潤澤光耀行常安穩五者未嘗恚恨人亦不鬪亂人故足肌細軟好安步無極六者見深坑泥水之處輒為施橋梁故所蹈平安好七者持數千萬種物羅列道中用布施足下輪輻成行説經時八者在所輒益天下人壽命故輪輻相當自致大尊九者在所布施深經自教亦教人故足輪盡深十者在所柔仁見人如故足下文不受塵柔軟十一者不數人惡亦不令人恚恨故足下盡直以善意向十方十二者在所次第教人不懈怠故足指節盡正直十三者稱誦佛功德故足指洞好十四者於官道邊種樹施井浴池故名聞十五者解人疑難無所愛惜故爪赤銅色十六者作事常竟之人有愛重不別離之故足指生種姓家得佛無有能度者十七者持戒不動故足指間慢人所作悉知十八者持戒不願生天上故足指齊十九者在種姓易人作惡故裸平落知人意二十者不貪所問即為解之故得無上智二十一者自守精進故裸澤潤光好人有惡意悉知之二十二者至誠故裸不桎知人心中所念二十三者經悉欲令人在前知佛説經皆樂問之得身力無能折碎者二十四者布施人經故身具説經諦無謬誤二十五者人説經終不可止授人經皆具足故身體𪪠博成滿好説經𧑮動之類皆聞知之二十六等有疑惑者以佛三藏為解之故勝正貴好二十七者不毀傷人身意亦不形笑是故得八十種好人見之莫不歡喜二十八者見女人有病以智慧意治是故身端正尊無比二十九者浴洗人身治去三故身淨潔光照十方三十者見貢高不敬者輒敬練止之故身軟澤三十一者不為媒灼之事亦不謀議人故面無理得無不畏三十二者見疾病者與藥令健故不愁憂三十三者見人不端政者不形笑但成人之美故成佛身潤澤淨潔三十四者勸樂作福為善故身在惡處度脫之三十五者見疲極飢渴者勞問案摩之故背平好亦愈人愛欲病三十六者見人作善歡喜高大之故兩䝱骨上下平悉知人意三十七者隨人所喜與戒令忍辱制意故兩䝱洞好為人經隨次第三十八者見女人産乳難以慈心助之令早順生故齊深好度脫人愛恩之根三十九者不恚瞋所作不謬誤不恭敬者教之故齊員隆起四十者以師所戒自教亦教人故齊理隨順施四十一者自不淫姪亦心他人故從丐奴下乘條除腹中無惡露四十二者人意喜樂時不敗亂安穩之不豫凡人事故文相成身如天剛鐵無能壞者四十三者慈心念天下人意等故兩䝱隆滿四十四者所念弘廣教人為善隆滿故兩肩廣大所知彌深四十五者智慧勇健持心不動故兩臂洞長指頭有萬字四十六者不説欺慢淫淫之事故唇口如真丹無臭處惡露四十七者不止人識心無瞋恚諭諂之態故口不大不小適得其中如含笑四十八者以五香之味與人五藥故舌無垢四十九者不形笑人不罵人故人其語莫不悅喜開解者五十者持戒行觀不説女人故牙員好堅緻以點力破壞愛欲五十一者分別要解人疑難故牙堅利愛欲破散五十二者人問一事為解若干事故牙濟方利隨次外道五十三者雜香澤和與人著鼻中故殊好未嘗聞臭但聞香五十四者見聚糞掃除棄之故光明淨潔以好眼視人五十五者世世佛像故目長好經莫不開解者五十六者世世以淨心瞻視人故目如含笑所視莫不見五十七者世世見人富貴心不貪樂故目不大不小察然得其中未嘗𥈇五十八者世世以善意安穩心故目無痑埋視天上天下五十九者世世不能識故明目不形笑人亦不睇人婦女故眉目明好在所為人中師六十者世世自念後世亦念人善故眉好如半月悉見十方之事六十一者世世不瞋恚變色故眉光澤六十二者世世見怨家親屬心正等故眉柔潤六十三者世世喜事明師欲解後妙深經故眉紺青色六十四者世世見人説經不求短以語人故耳洞聽聞天上六十五者世世不家人耳不據人耳及手足故耳不大小亦得其中潤澤好不聽聲六十六者世世見行道自守者不敢驚恐之故識事不忘六十七者世世所聞經法不增減其義故額長六寸威神生六十八者世世教授以次第故髮隨次澤好不受塵垢六十九者世世與人語常和顏悅色不罵詈惡口故髮細好無比七十者世世恭敬師及明人持戒者以醍醐麻及所著衣物施與人故髮潤澤姝好七十一者世世以諸功德教授人故髮均遍無間缺人見其髮莫不喜者七十二者世世見人是非不傳説其善惡故污塵不著入亦不見其惡七十三者世世不滅佛前及人燈火故塵垢不著其髮生光耀七十四者世世以好意與人冠㥽貂蟬覆髮巾席故髮文聚生威神見無厭極七十五者布髮令父母師蹈之故髮文相見知十方人所念七十六者世世欲得珍寶物者輒善與故髮遍等如盡所願悉得七十七者世世欲使人以戒不從索物常願與善師明經人共從事故髮文相生其間如瓶威業聲聞十方七十八者世世教同學明經者故髮齊等意定七十九者世世所學作輒而竟之故功德成就八十者世世常饒益人使安穩故慈心所説曠蕩潤懿無有窮極世世菩薩所行如是
